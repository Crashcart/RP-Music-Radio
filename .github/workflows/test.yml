name: Test Suite

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      - name: Test with pytest
        run: |
          if [ -d backend ]; then cd backend && pytest; else echo "No backend implementation yet."; fi
        continue-on-error: true

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          if [ -d frontend ]; then cd frontend && npm ci; fi
      - name: Run tests
        run: |
          if [ -d frontend ]; then cd frontend && npm test -- --run; else echo "No frontend implementation yet."; fi
        continue-on-error: true

  test-ollama-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      ollama:
        image: ollama/ollama:latest
        options: >-
          --health-cmd "curl -f http://localhost:11434/api/tags || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Pull Ollama model (mistral)
        run: |
          # Wait for Ollama service to be ready
          for i in {1..30}; do
            if curl -f http://localhost:11434/api/tags; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/30)"
            sleep 2
          done
          # Pull mistral model (lightweight for CI)
          curl -X POST http://localhost:11434/api/pull -d '{"name":"mistral"}' || true
        continue-on-error: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      - name: Test Ollama integration
        env:
          OLLAMA_ENABLED: 'true'
          OLLAMA_HOST: 'http://localhost:11434'
          OLLAMA_MODEL: 'mistral'
        run: |
          if [ -d backend ]; then cd backend && pytest -k "ollama" -v; else echo "No backend tests."; fi
        continue-on-error: true
