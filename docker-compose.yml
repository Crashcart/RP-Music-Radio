
services:
  aetherwave-api:
    env_file:
      - path: .env
        required: false
    image: aetherwave/factory-core:latest
    container_name: aetherwave_api
    build:
      context: .
      dockerfile: Dockerfile.optimized
    volumes:
      - ./radio_vault:/app/output        # Host mount: generated MP3s
      - ./persona_db:/app/persistence    # Host mount: Voice DNA storage
      - ./market_ingest:/app/input       # Host mount: CSV uploads
      - ./data:/app/data                 # Host mount: SQLite database
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - DEVICE_TYPE=${DEVICE_TYPE:-INTEL_QUICKSYNC}
      - AUTO_NAME_FORMAT=${AUTO_NAME_FORMAT:-{STATION}_{ARTIST}_{TRACK}.mp3}
      - FILLER_ENABLED=${FILLER_ENABLED:-true}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/aetherwave.db}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_PORT=${API_PORT:-8433}
      - API_HOST=${API_HOST:-0.0.0.0}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
    ports:
      - "${API_PORT:-8433}:8000"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  aetherwave-frontend:
    image: aetherwave/factory-ui:latest
    container_name: aetherwave_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=
    ports:
      - "8432:5173"
    depends_on:
      - aetherwave-api
    restart: unless-stopped

  aetherwave-worker:
    image: aetherwave/factory-worker:latest
    container_name: aetherwave_worker
    build:
      context: .
      dockerfile: Dockerfile.worker.optimized
    volumes:
      - ./radio_vault:/app/output
      - ./persona_db:/app/persistence
      - ./data:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - DEVICE_TYPE=${DEVICE_TYPE:-INTEL_QUICKSYNC}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/aetherwave.db}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  aetherwave-beat:
    image: aetherwave/factory-worker:latest
    container_name: aetherwave_beat
    build:
      context: .
      dockerfile: Dockerfile.worker.optimized
    command: celery -A app.tasks beat --loglevel=info
    volumes:
      - ./data:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/aetherwave.db}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aetherwave_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OPTIONAL: Ollama for local LLM support ───────────────────
  # Uncomment the environment variables in aetherwave-api to enable:
  #   OLLAMA_ENABLED=true
  #   OLLAMA_HOST=http://ollama:11434
  #   OLLAMA_MODEL=mistral (or llama2, neural-chat, etc.)
  #
  # Start with: docker-compose up ollama
  # Then pull a model: docker-compose exec ollama ollama pull mistral
  #
  # Requires: 8GB+ RAM, 10GB+ disk for model storage
  ollama:
    image: ollama/ollama:latest
    container_name: aetherwave_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_models:/root/.ollama
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - ollama  # Use: docker-compose --profile ollama up


networks:
  default:
    name: aetherwave_network
