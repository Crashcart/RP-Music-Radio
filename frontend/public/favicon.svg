<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0e27"/>

  <!-- Radio wave arcs -->
  <circle cx="50" cy="50" r="15" fill="none" stroke="#00d9ff" stroke-width="2"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#00d9ff"/>

  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="6" fill="#00d9ff" filter="url(#glow)" opacity="0.8"/>
</svg>
